{% if messages %}
    <div class="messages-wrapper">
        {% for message in messages %}
            <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show app-alert" role="alert">
                {{ message }}

                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
            </div>
        {% endfor %}
    </div>
{% endif %}
